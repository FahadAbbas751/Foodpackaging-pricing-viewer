*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
header{background:#fff;border-bottom:1px solid #e5e5e5;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

header span{font-size:12px;color:#888}
.layout{display:flex;height:calc(100vh - 57px)}
.sidebar{width:280px;min-width:280px;background:#fff;border-right:1px solid #e5e5e5;overflow-y:auto;padding:12px 0}
.sidebar-search{padding:0 12px 10px;position:sticky;top:0;background:#fff;border-bottom:1px solid #f0f0f0;margin-bottom:8px;padding-top:4px}
.sidebar-search input{width:100%;padding:7px 10px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;outline:none;background:#fafafa}
.sidebar-search input:focus{border-color:#aaa;background:#fff}
.prod-item{padding:9px 16px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.prod-item:hover{background:#f8f8f6}
.prod-item.active{background:#f0f0ee;border-left-color:#1a1a1a}
.prod-item .pname{font-size:13px;font-weight:500;line-height:1.3;color:#1a1a1a}
.prod-item .pcnt{font-size:11px;color:#aaa;white-space:nowrap}
.main{flex:1;overflow-y:auto;padding:24px}
.product-title{font-size:20px;font-weight:600;margin-bottom:4px}
.product-meta{font-size:12px;color:#888;margin-bottom:16px}
.product-meta a{color:#555;text-decoration:none}
.product-meta a:hover{text-decoration:underline}
.option-groups{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.og-badge{font-size:11px;background:#f0f0f0;border-radius:20px;padding:3px 10px;color:#555}
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;padding:14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:130px}
.filter-group label{font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.filter-group select{padding:6px 8px;border:1px solid #e5e5e5;border-radius:6px;font-size:12px;background:#fafafa;outline:none;cursor:pointer}
.filter-group select:focus{border-color:#aaa}
.filter-actions{display:flex;align-items:flex-end;gap:8px}
.btn-reset{padding:6px 12px;border:1px solid #e5e5e5;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;color:#555}
.btn-reset:hover{background:#f5f5f3}
.result-count{font-size:12px;color:#888;margin-bottom:12px}
.variant-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:12px;overflow:hidden}
.variant-header{padding:10px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.combo-tag{font-size:11px;background:#fff;border:1px solid #e5e5e5;border-radius:5px;padding:3px 8px;color:#444}
.combo-tag b{color:#1a1a1a}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:8px 14px;text-align:left;border-bottom:1px solid #f0f0f0}
td{padding:8px 14px;border-bottom:1px solid #f8f8f8;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
td.qty{font-weight:500;color:#1a1a1a}
td.total{font-weight:600}
td.per{color:#555}
.save-tag{display:inline-block;font-size:11px;background:#e8f5e9;color:#2e7d32;border-radius:20px;padding:2px 7px;font-weight:500}
.quote-tag{display:inline-block;font-size:11px;background:#e3f2fd;color:#1565c0;border-radius:20px;padding:2px 7px}
.check{color:#4caf50;font-size:14px}
.empty{text-align:center;padding:48px;color:#aaa;font-size:14px}
.no-prod{display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:14px}
.our-price-wrap{display:flex;align-items:center;gap:5px}
.our-price-wrap span{font-size:13px;color:#aaa}
.our-price-input{width:80px;padding:4px 7px;border:1px solid #e5e5e5;border-radius:6px;font-size:13px;outline:none;background:#fafff8;color:#1a1a1a;font-family:inherit}
.our-price-input:focus{border-color:#4caf50;background:#fff}
.our-price-input.has-value{border-color:#4caf50;background:#f0faf2;color:#2e7d32;font-weight:500}
.saved-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;display:none;flex-shrink:0}
.saved-dot.show{display:inline-block}
@media print{.sidebar,.filters,.btn-reset,.sidebar-search{display:none}.layout{height:auto;display:block}.main{padding:16px}.variant-card{break-inside:avoid}.our-price-input{border:none;background:transparent;font-weight:500;color:#2e7d32}}

let currentIdx = null;
const filterState = {};

function priceKey(slug, combo, qty) {
  const comboStr = Object.entries(combo).filter(([k])=>k!=='quantity').map(([k,v])=>k+':'+v).join('|');
  return 'ourprice__' + slug + '__' + comboStr + '__' + qty;
}
function savePrice(slug, combo, qty, val) {
  const k = priceKey(slug, combo, qty);
  if(val.trim()==='') localStorage.removeItem(k);
  else localStorage.setItem(k, val.trim());
}
function getPrice(slug, combo, qty) {
  return localStorage.getItem(priceKey(slug, combo, qty)) || '';
}

function renderSidebar(query='') {
  const q = query.toLowerCase();
  const list = document.getElementById('prod-list');
  list.innerHTML = DATA.map((p,i) => {
    if(q && !p.title.toLowerCase().includes(q)) return '';
    const vc = p.variantPricing ? p.variantPricing.length : 0;
    return `<div class="prod-item${currentIdx===i?' active':''}" onclick="loadProduct(${i})">
      <span class="pname">${p.title}</span>
      <span class="pcnt">${vc}v</span>
    </div>`;
  }).join('');
}

function loadProduct(idx) {
  currentIdx = idx;
  const p = DATA[idx];
  Object.keys(filterState).forEach(k => delete filterState[k]);
  const optGroups = (p.optionGroups||[]).filter(g=>g.name!=='quantity');
  optGroups.forEach(g => filterState[g.name]='all');
  renderSidebar(document.getElementById('prod-search').value);
  renderProduct(p, optGroups);
}

function renderProduct(p, optGroups) {
  const main = document.getElementById('main');
  const dateStr = p.createdAt && p.createdAt.$date ? new Date(p.createdAt.$date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '';
  const ogBadges = optGroups.map(g=>`<span class="og-badge">${g.name}</span>`).join('');
  const filterHTML = optGroups.map(g=>`
    <div class="filter-group">
      <label>${g.name}</label>
      <select data-group="${g.name}" onchange="updateFilter(this)">
        <option value="all">All</option>
        ${g.options.map(o=>`<option value="${encodeURIComponent(o)}">${o}</option>`).join('')}
      </select>
    </div>`).join('');

  main.innerHTML = `
    <div class="product-title">${p.title}</div>
    <div class="product-meta">
      ${dateStr ? `Added ${dateStr} &nbsp;·&nbsp; ` : ''}
      <a href="${p.sourceUrl||'#'}" target="_blank">View on noissue ↗</a>
      &nbsp;·&nbsp; slug: ${p.slug||'—'}
    </div>
    <div class="option-groups">${ogBadges}</div>
    ${optGroups.length ? `<div class="filters">${filterHTML}<div class="filter-actions"><button class="btn-reset" onclick="resetFilters()">Reset</button></div></div>` : ''}
    <div class="result-count" id="result-count"></div>
    <div id="variants"></div>`;
  renderVariants(p);
}

function updateFilter(sel) {
  filterState[sel.dataset.group] = sel.value === 'all' ? 'all' : decodeURIComponent(sel.value);
  renderVariants(DATA[currentIdx]);
}

function resetFilters() {
  Object.keys(filterState).forEach(k=>filterState[k]='all');
  document.querySelectorAll('.filter-group select').forEach(s=>s.value='all');
  renderVariants(DATA[currentIdx]);
}

function renderVariants(p) {
  const variants = p.variantPricing || [];
  const optGroups = (p.optionGroups||[]).filter(g=>g.name!=='quantity');
  const filtered = variants.filter(v => {
    return optGroups.every(g => {
      if(filterState[g.name]==='all') return true;
      return v.combination && v.combination[g.name]===filterState[g.name];
    });
  });

  document.getElementById('result-count').textContent = `Showing ${filtered.length} of ${variants.length} variant${variants.length!==1?'s':''}`;

  const container = document.getElementById('variants');
  if(!filtered.length) {
    container.innerHTML = '<div class="empty">No variants match the current filters.</div>';
    return;
  }

  container.innerHTML = filtered.map(v => {
    const combo = v.combination || {};
    const tags = Object.entries(combo).filter(([k])=>k!=='quantity').map(([k,val])=>`<span class="combo-tag"><b>${k}:</b> ${val}</span>`).join('');
    const rows = (v.pricingTiers||[]).map(t=>{
      const slug = p.slug||'';
      const combo = v.combination||{};
      const stored = getPrice(slug, combo, t.qty);
      const hasVal = stored !== '';
      return `<tr>
        <td class="qty">${t.qty}</td>
        <td class="total">$${typeof t.total==='number'?t.total.toFixed(2):t.total}</td>
        <td class="per">$${typeof t.perUnit==='number'?t.perUnit.toFixed(4):t.perUnit}</td>
        <td>${t.save?`<span class="save-tag">${t.save}</span>`:'—'}</td>
        <td>${t.isQuote?'<span class="quote-tag">Quote</span>':'<span class="check">✓</span>'}</td>
        <td><div class="our-price-wrap"><span>$</span><input class="our-price-input${hasVal?' has-value':''}" type="number" min="0" step="0.01" placeholder="0.00" value="${stored}" data-slug="${slug}" data-combo='${JSON.stringify(combo)}' data-qty="${t.qty}" oninput="handlePriceInput(this)"><span class="saved-dot${hasVal?' show':''}"></span></div></td>
      </tr>`;
    }).join('');
    return `<div class="variant-card">
      <div class="variant-header">${tags||'<span class="combo-tag">Default</span>'}</div>
      <table>
        <thead><tr><th>Qty</th><th>Total (noissue)</th><th>Per unit</th><th>Savings</th><th>Instant price</th><th>Our price</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

function handlePriceInput(el) {
  const slug = el.dataset.slug;
  const combo = JSON.parse(el.dataset.combo);
  const qty = el.dataset.qty;
  const val = el.value;
  savePrice(slug, combo, qty, val);
  const dot = el.nextElementSibling;
  if(val.trim()!=='') { el.classList.add('has-value'); if(dot) dot.classList.add('show'); }
  else { el.classList.remove('has-value'); if(dot) dot.classList.remove('show'); }
}

document.getElementById('prod-search').addEventListener('input', e => renderSidebar(e.target.value));
document.getElementById('hdr-meta').textContent = `${DATA.length} products`;
renderSidebar();
</script>
</body>
</html>
